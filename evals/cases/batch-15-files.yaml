name: batch-15-files
# NOTES.md finding 4: genuinely needs ~17 steps against a 10-step budget.
# This case documents the budget-exhaustion behavior rather than requiring
# success — the abort classifier (harness/loop.py's _abort_stats) should
# report clean linear progress ("progressing"), not a stuck loop.
task: >
  Create 15 files in the workspace named part_01.txt through part_15.txt
  (zero-padded two-digit numbers), each containing the text "part N" where N
  is that file's number.
max_steps: 10
checks:
  - type: final_answer_regex
    pattern: progressing
