name: batch-15-files-sufficient-budget
# Companion to batch-15-files.yaml. Same task, but with enough budget
# headroom (15 writes + list_dir + answer is ~17 steps) that completing the
# batch is the expected outcome, not exhaustion or a decline. Separates
# "does it decline correctly under an insufficient budget" (batch-15-files,
# max_steps: 10 — see NOTES.md findings 4/9/10) from "does it actually
# complete under a sufficient one" (this case).
task: >
  Create 15 files in the workspace named part_01.txt through part_15.txt
  (zero-padded two-digit numbers), each containing the text "part N" where N
  is that file's number.
max_steps: 20
checks:
  - type: completed
  - type: file_written
    path: part_01.txt
  - type: file_written
    path: part_02.txt
  - type: file_written
    path: part_03.txt
  - type: file_written
    path: part_04.txt
  - type: file_written
    path: part_05.txt
  - type: file_written
    path: part_06.txt
  - type: file_written
    path: part_07.txt
  - type: file_written
    path: part_08.txt
  - type: file_written
    path: part_09.txt
  - type: file_written
    path: part_10.txt
  - type: file_written
    path: part_11.txt
  - type: file_written
    path: part_12.txt
  - type: file_written
    path: part_13.txt
  - type: file_written
    path: part_14.txt
  - type: file_written
    path: part_15.txt
